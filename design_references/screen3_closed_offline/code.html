<!DOCTYPE html>

<html class="light" lang="en"><head>

    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-[#F5F5F5] text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Mobile Frame Simulation -->
<div class="relative w-full max-w-md h-[850px] bg-[#F5F5F5] rounded-[2.5rem] overflow-hidden shadow-2xl ring-8 ring-surface-container-highest flex flex-col">
<!-- Status Bar Simulator (Not part of UI spec, just for frame realism) -->
<div class="h-6 w-full flex justify-between items-center px-6 text-xs font-medium text-on-surface-variant z-50">
<span>9:41</span>
<div class="flex space-x-1">
<span class="material-symbols-outlined text-[14px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full max-w-md z-40 pt-6">
<div class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl shadow-sm flex items-center justify-center px-6 h-16 w-full">
<h1 class="font-public-sans tracking-tight font-bold text-xl text-primary font-black tracking-tighter text-center">RailAlert Raiwala</h1>
</div>
<!-- Offline Banner -->
<div class="h-[36px] bg-[#37474F] text-white flex items-center px-4 gap-2 shadow-md">
<span class="material-symbols-outlined text-sm">wifi_off</span>
<span class="text-sm font-medium tracking-wide">⚡ Offline — showing last known status</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-32 pb-24 overflow-y-auto">
<!-- Status Card -->
<div class="w-full bg-[#FFEBEE] border-2 border-[#EF9A9A] rounded-2xl flex flex-col items-center justify-center p-8 relative overflow-hidden transition-all duration-300">
<div class="mb-6 bg-[#C62828] text-white w-20 h-20 rounded-full flex items-center justify-center shadow-[0_4px_20px_rgba(198,40,40,0.2)]">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 700;">cancel</span>
</div>
<h2 class="text-5xl font-extrabold text-[#C62828] tracking-tight mb-2 text-center leading-none">GATE CLOSED</h2>
<p class="text-on-surface-variant font-medium text-center mb-8 text-sm">Wait or take an alternate route</p>
<div class="mt-auto bg-white/50 backdrop-blur-sm py-2 px-4 rounded-full flex items-center gap-2 border border-[#EF9A9A]/30">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">schedule</span>
<span class="text-xs text-on-surface-variant font-medium tracking-wide">Updated 1 min ago</span>
</div>
</div>
</main>
</div>
