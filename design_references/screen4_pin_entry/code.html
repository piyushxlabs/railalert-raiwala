<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RailAlert Raiwala - PIN Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-surface-variant": "#5a4138",
                    "secondary-container": "#ff946c",
                    "on-secondary-fixed": "#380d00",
                    "on-error-container": "#93000a",

                    "surface-container": "#eeeeee",
                    "tertiary-container": "#0072e4",
                    "secondary-fixed": "#ffdbcf",
                    "on-tertiary-fixed-variant": "#00458f",
                    "inverse-primary": "#ffb59a",

            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"

            "spacing": {},

                    "headline": [
                            "Public Sans"
                    ],
                    "body": [
                            "Public Sans"
                    ],
                    "label": [
                            "Public Sans"
                    ]
            }
    },
        },
      }

<style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .phone-frame {
            width: 390px;
            height: 844px;
            background-color: #1a1a1a;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            height: 100%;
            background-color: #f9f9f9;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Shadows */
        .ambient-shadow {
            box-shadow: 0px 4px 20px rgba(26, 28, 28, 0.04), 0px 8px 40px rgba(26, 28, 28, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="phone-frame">
<div class="screen">
<!-- Dimmed Background Content (Simulated Alert Dashboard) -->
<div class="absolute inset-0 bg-surface flex flex-col pointer-events-none opacity-40">
<!-- Mock TopAppBar -->
<div class="bg-[#f9f9f9] dark:bg-zinc-950 flex justify-between items-center px-6 py-4 w-full z-50">
<span class="material-symbols-outlined text-[#a43700] dark:text-orange-500" data-icon="menu">menu</span>
<h1 class="font-['Public_Sans'] tracking-tight text-lg font-black text-[#a43700] dark:text-orange-500">Gateman Access</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
<!-- Mock Dashboard Content -->
<div class="flex-1 p-6 space-y-6">
<div class="bg-surface-container-low rounded-lg p-6 h-32 flex flex-col justify-center">
<div class="text-on-surface-variant text-sm mb-1">Active Alerts</div>
<div class="text-on-surface text-3xl font-bold">12</div>
</div>
<div class="space-y-4">
<div class="bg-surface-container-low rounded-lg p-4 flex items-center justify-between">
<div>
<div class="text-on-surface font-medium">Train 1201</div>
<div class="text-on-surface-variant text-sm">Approaching Raiwala</div>
</div>
<div class="bg-tertiary text-on-tertiary px-3 py-1 rounded-full text-xs font-medium">Confirmed</div>
</div>
<div class="bg-surface-container-low rounded-lg p-4 flex items-center justify-between">
<div>
<div class="text-on-surface font-medium">Gate 42</div>
<div class="text-on-surface-variant text-sm">Status Check Required</div>
</div>
<div class="bg-surface-container-highest text-on-surface px-3 py-1 rounded-full text-xs font-medium">Pending</div>
</div>
</div>
</div>
<!-- Mock BottomNavBar -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border-t border-[#e3bfb2]/15">
<div class="flex flex-col items-center justify-center text-[#5a4138] dark:text-zinc-500 opacity-70">
<span class="material-symbols-outlined" data-icon="train">train</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wider uppercase">Status</span>
</div>
<div class="flex flex-col items-center justify-center text-[#5a4138] dark:text-zinc-500 opacity-70">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wider uppercase">Alerts</span>
</div>
<div class="flex flex-col items-center justify-center text-[#5a4138] dark:text-zinc-500 opacity-70">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wider uppercase">Logs</span>
</div>
<div class="flex flex-col items-center justify-center text-[#a43700] dark:text-orange-400 bg-[#ffdbcf]/30 rounded-xl px-4 py-1">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wider uppercase">Profile</span>
</div>
</div>
</div>
<!-- Overlay Scrim -->
<div class="absolute inset-0 bg-on-surface/20 backdrop-blur-[2px] z-40"></div>
<!-- Bottom Sheet Modal -->
<div class="absolute bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[16px] z-50 flex flex-col items-center pb-8 pt-2 ambient-shadow translate-y-0 transition-transform duration-300">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full mb-8"></div>
<!-- Header -->
<h2 class="text-on-surface text-[20px] font-medium tracking-tight mb-2">Gateman Access</h2>
<p class="text-on-surface-variant text-[14px] mb-8">Enter PIN</p>
<!-- PIN Indicators -->
<div class="flex gap-4 mb-10">
<div class="w-5 h-5 rounded-full bg-on-surface"></div>
<div class="w-5 h-5 rounded-full bg-on-surface"></div>
<div class="w-5 h-5 rounded-full border-[1.5px] border-outline"></div>
<div class="w-5 h-5 rounded-full border-[1.5px] border-outline"></div>
</div>
<!-- Keypad -->
<div class="grid grid-cols-3 gap-x-8 gap-y-6 mb-8 px-8 w-full max-w-sm">
<!-- Row 1 -->
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">1</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">2</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">3</button>
<!-- Row 2 -->
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">4</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">5</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">6</button>
<!-- Row 3 -->
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">7</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">8</button>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">9</button>
<!-- Row 4 -->
<div class="flex items-center justify-center">
<button class="w-[72px] h-[72px] rounded-full bg-transparent flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">*</button>
</div>
<button class="w-[72px] h-[72px] rounded-full bg-surface-container flex items-center justify-center text-[24px] text-on-surface font-medium hover:bg-surface-container-highest transition-colors mx-auto">0</button>
<div class="flex items-center justify-center">
<button class="w-[72px] h-[72px] rounded-full bg-transparent flex items-center justify-center text-on-surface hover:bg-surface-container-highest transition-colors mx-auto">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
</div>
<!-- Cancel Action -->
<button class="text-on-surface-variant font-medium text-[14px] hover:text-on-surface transition-colors mt-2">
                    Cancel
                </button>
</div>
</div>
</div>
